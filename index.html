<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bamboo.</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #C1B19A;
            --dark: #2C251B;
            --bg: #FDFBF7;
            --surface: #F5F1EA;
            --muted: rgba(44, 37, 27, 0.38);
            --muted-med: rgba(44, 37, 27, 0.55);
            --border: rgba(44, 37, 27, 0.09);
            --border-med: rgba(44, 37, 27, 0.14);
            --red: #ef4444;
            --red-light: rgba(239, 68, 68, 0.12);
            --blue: #3b82f6;
            --orange: #f97316;
            --flame: #ff6b35;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes flameFlicker {

            0%,
            100% {
                opacity: 0.8;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.05)
            }
        }

        @keyframes flameIgnite {
            0% {
                transform: scale(0) translateY(50px) rotate(-15deg);
                opacity: 0;
                filter: brightness(3) drop-shadow(0 0 20px #ff9600);
            }

            40% {
                transform: scale(1.15) translateY(-10px) rotate(5deg);
                opacity: 1;
                filter: brightness(1.5) drop-shadow(0 0 10px #ff9600);
            }

            70% {
                transform: scale(0.95) translateY(5px) rotate(-2deg);
                filter: brightness(1);
            }

            100% {
                transform: scale(1) translateY(0) rotate(0deg);
            }
        }

        @keyframes mainFlameIdle {

            0%,
            100% {
                transform: scale(1) skewX(0deg);
            }

            50% {
                transform: scale(1.02) skewX(-2deg);
            }
        }

        @keyframes emberFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .flame-svg {
            width: 140px;
            height: auto;
            animation: flameIgnite 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, mainFlameIdle 3s ease-in-out infinite 0.7s;
            margin: 0 auto;
            display: block;
            transition: filter 0.5s ease, opacity 0.5s ease;
            overflow: visible;
        }

        .flame-svg.grayscale {
            filter: grayscale(1) opacity(0.5);
        }

        .ember {
            fill: #ffcc00;
            opacity: 0;
        }

        /* ── HEADER ── */
        .header-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 52px 20px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: lowercase;
            cursor: pointer;
            transition: opacity .2s;
            user-select: none;
        }

        .logo:active {
            opacity: .5
        }

        .sort-btn {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s;
            color: var(--muted);
        }

        .sort-btn:hover {
            background: rgba(0, 0, 0, .04);
            color: var(--dark)
        }

        .sort-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round
        }

        /* ── VIEWS ── */
        .view {
            display: none
        }

        .view.active {
            display: block
        }

        /* ── REMINDERS ── */
        .list-wrap {
            max-width: 600px;
            margin: 0 auto;
            padding: 4px 20px 160px
        }

        .section-lbl {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 18px 0 8px
        }

        .reminder-item {
            padding: 16px 0 16px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all .3s;
            user-select: none;
            animation: slideUp .32s ease-out forwards;
            opacity: 0;
            position: relative;
            background: var(--bg);
        }

        .reminder-item:hover {
            transform: translateX(3px);
            background: rgba(0, 0, 0, .012);
            border-radius: 0 8px 8px 0
        }

        .reminder-item.completed {
            opacity: .28
        }

        .reminder-item.completed:hover {
            transform: none;
            background: transparent
        }

        .reminder-item.overdue {
            border-left: 3px solid var(--red)
        }

        .r-text {
            font-size: 17px;
            font-weight: 400;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap
        }

        .reminder-item.completed .r-text {
            text-decoration: line-through;
            color: var(--muted)
        }

        .r-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 300
        }

        .r-meta span {
            display: flex;
            align-items: center;
            gap: 3px
        }

        .meta-ico {
            width: 11px;
            height: 11px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 7px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500
        }

        .badge-red {
            background: var(--red-light);
            color: var(--red)
        }

        .badge-blue {
            background: rgba(59, 130, 246, .1);
            color: var(--blue)
        }

        .badge-orange {
            background: rgba(249, 115, 22, .1);
            color: var(--orange)
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 300;
            line-height: 2
        }

        /* ── DISCIPLINE/HABITS ── */
        .habits-wrap {
            max-width: 600px;
            margin: 0 auto;
            padding: 4px 20px 160px
        }

        .habit-item {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            background: var(--surface);
            transition: all .2s;
            cursor: pointer;
            animation: slideUp .32s ease-out forwards;
            opacity: 0;
        }

        .habit-item:nth-child(1) {
            animation-delay: 0s
        }

        .habit-item:nth-child(2) {
            animation-delay: 0.04s
        }

        .habit-item:nth-child(3) {
            animation-delay: 0.08s
        }

        .habit-item:nth-child(4) {
            animation-delay: 0.12s
        }

        .habit-item:nth-child(5) {
            animation-delay: 0.16s
        }

        .habit-item:hover {
            background: rgba(232, 228, 217, 0.15);
            border-color: #e8e4d9;
        }

        .habit-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px
        }

        .habit-name {
            flex: 1;
            font-size: 16px;
            font-weight: 400;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .habit-streak {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--flame)
        }

        .habit-streak svg {
            width: 14px;
            height: 14px;
            animation: flameFlicker 1.8s ease-in-out infinite
        }

        .habit-streak.completed {
            color: var(--muted);
            opacity: .6
        }

        .habit-dots {
            display: flex;
            gap: 8px;
            margin-top: 12px
        }

        .habit-dot {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            transition: all .2s;
            border: 2px solid var(--border-med);
            background: transparent;
        }

        .habit-dot.filled {
            background: var(--accent);
            border-color: var(--dark);
        }

        .habit-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            margin-top: 10px
        }

        .habit-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            background: var(--bg);
            color: var(--dark);
        }

        .habit-btn:hover {
            background: var(--accent);
            color: var(--dark)
        }

        .habit-btn.danger {
            color: var(--red)
        }

        .habit-btn.danger:hover {
            background: var(--red-light);
            color: var(--red)
        }

        .habit-complete {
            background: var(--flame);
            color: white
        }

        .habit-complete:hover {
            filter: brightness(0.9)
        }

        .habit-complete.done {
            background: var(--muted);
            color: white;
            cursor: default
        }

        .habit-complete.done:hover {
            filter: brightness(1)
        }

        .add-habit-btn {
            width: 100%;
            padding: 14px;
            border: 1.5px dashed var(--border-med);
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            color: var(--muted);
            font-size: 14px;
            font-family: inherit;
            transition: all .2s;
            margin: 20px 0;
        }

        .add-habit-btn:hover {
            border-color: var(--flame);
            color: var(--flame);
            background: rgba(255, 107, 53, .04)
        }

        /* ── CHAT BUBBLE & OVERLAY ── */
        .chat-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }

        .chat-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-bubble-wrap {
            position: fixed;
            bottom: -160px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 520px;
            transition: bottom .45s cubic-bezier(.175, .885, .32, 1.275);
            z-index: 300
        }

        .chat-bubble-wrap.show {
            bottom: 104px
        }

        .chat-bubble {
            background: var(--dark);
            border-radius: 26px;
            padding: 13px 13px 13px 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15)
        }

        .chat-bubble textarea {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            color: var(--bg);
            font-weight: 300;
            resize: none;
            overflow-y: auto;
            line-height: 1.45;
            max-height: 100px;
            padding: 0;
            margin-bottom: 4px
        }

        .chat-bubble textarea::placeholder {
            color: rgba(253, 251, 247, .35)
        }

        .send-btn {
            background: var(--accent);
            color: var(--dark);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform .2s;
            margin-bottom: 1px
        }

        .send-btn:active {
            transform: scale(.86)
        }

        .send-btn svg {
            width: 17px;
            height: 17px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            margin-left: 2px;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        /* ── CONTEXT MENU ── */
        .ctx-menu {
            position: fixed;
            background: var(--bg);
            border-radius: 14px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, .14);
            padding: 7px;
            min-width: 170px;
            z-index: 200;
            display: none;
            opacity: 0;
            transform: scale(.94);
            transform-origin: top left;
            transition: opacity .15s, transform .15s;
            border: 1px solid var(--border-med)
        }

        .ctx-menu.show {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: scale(1)
        }

        .cm-item {
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
            transition: background .15s;
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--dark)
        }

        .cm-item:hover {
            background: var(--surface)
        }

        .cm-item.danger {
            color: #ef4444
        }

        .cm-item svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .cm-divider {
            height: 1px;
            background: var(--border);
            margin: 3px 0
        }

        /* ── MODALS ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(44, 37, 27, .35);
            backdrop-filter: blur(8px);
            z-index: 900;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity .25s
        }

        .modal.show {
            display: flex;
            opacity: 1
        }

        .modal-box {
            background: var(--bg);
            padding: 24px 20px 36px;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: translateY(40px);
            transition: transform .38s cubic-bezier(.175, .885, .32, 1.275);
            box-shadow: 0 -8px 40px rgba(0, 0, 0, .1)
        }

        .modal.show .modal-box {
            transform: translateY(0)
        }

        .modal-handle {
            width: 36px;
            height: 3px;
            background: var(--border-med);
            border-radius: 2px;
            margin: 0 auto -4px
        }

        .modal-title {
            font-size: 17px;
            font-weight: 500
        }

        .modal-inp {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border-med);
            border-radius: 13px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            background: var(--surface);
            color: var(--dark);
            transition: border-color .2s
        }

        textarea.modal-inp {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5
        }

        .modal-inp:focus {
            border-color: var(--accent);
            background: var(--bg)
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end
        }

        .btn {
            padding: 11px 20px;
            border-radius: 11px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all .2s
        }

        .btn-cancel {
            background: var(--surface);
            color: var(--muted-med)
        }

        .btn-cancel:hover {
            color: var(--dark)
        }

        .btn-save {
            background: var(--accent);
            color: var(--dark)
        }

        .btn-save:hover {
            filter: brightness(.93);
            transform: translateY(-1px)
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) scale(.85);
            background: #4a7c59;
            color: white;
            padding: 11px 18px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(74, 124, 89, .3)
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1)
        }

        .toast svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: min(320px, calc(100% - 40px));
            display: flex;
            gap: 10px;
            justify-content: space-around;
            background: rgba(44, 37, 27, .05);
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            z-index: 200;
        }

        .nav-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--muted);
            font-family: inherit;
            transition: all .2s;
        }

        .nav-btn:hover {
            color: var(--dark)
        }

        .nav-btn.active {
            background: var(--surface);
            color: var(--dark)
        }

        .nav-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none
        }

        ::-webkit-scrollbar {
            width: 0;
            background: transparent
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header-wrap">
        <div class="logo" id="header-title" onclick="toggleBubble(event)">bamboo.</div>
        <div class="sort-btn" id="sort-btn-wrap" onclick="openSortMenu(event)">
            <svg viewBox="0 0 24 24">
                <path d="M4 6h16M7 12h10M10 18h4" />
            </svg>
        </div>
    </div>

    <!-- REMINDERS VIEW -->
    <div class="view active" id="view-reminders">
        <div class="list-wrap" id="reminder-list"></div>
    </div>

    <!-- DISCIPLINE VIEW -->
    <div class="view" id="view-discipline">
        <div style="text-align:center; padding: 50px 0 30px;">
            <svg class="flame-svg" viewBox="-10 0 120 130">
                <g class="embers">
                    <circle cx="50" cy="70" r="3" class="ember"
                        style="animation: emberFly 1.5s infinite ease-in 0.1s; --tx: -15px; --ty: -60px;" />
                    <circle cx="30" cy="80" r="4" class="ember"
                        style="animation: emberFly 1.8s infinite ease-in 0.5s; --tx: -25px; --ty: -50px;" />
                    <circle cx="70" cy="75" r="2.5" class="ember"
                        style="animation: emberFly 1.3s infinite ease-in 0.3s; --tx: 20px; --ty: -70px;" />
                    <circle cx="40" cy="50" r="3" class="ember"
                        style="animation: emberFly 1.6s infinite ease-in 0.8s; --tx: -10px; --ty: -65px;" />
                    <circle cx="60" cy="60" r="4.5" class="ember"
                        style="animation: emberFly 2s infinite ease-in 0.4s; --tx: 15px; --ty: -55px;" />
                    <circle cx="50" cy="90" r="2" class="ember"
                        style="animation: emberFly 1.2s infinite ease-in 0.9s; --tx: 5px; --ty: -80px;" />
                    <circle cx="80" cy="85" r="3.5" class="ember"
                        style="animation: emberFly 1.7s infinite ease-in 0.2s; --tx: 30px; --ty: -60px;" />
                    <!-- Use CSS variables to easily tweak the fillet radius and inner flame size! -->
                </g>
                <!-- Outer Orange Flame -->
                <path d="M 54.3,26 L 78.7,60 A 35,35 0 1,1 15,80 L 15,45 Q 16,35 32,45 L 45.7,26 Q 50,20 54.3,26 Z" fill="#ff9600"
                    stroke="#ff9600" stroke-width="7" stroke-linejoin="round" />
                <!-- Inner Yellow Teardrop -->
                <g style="transform-origin: 50px 72px;">
                    <path d="M 50,50 L 63.5,78.6 A 15,15 0 1,1 36.5,78.6 L 50,50 Z" fill="#ffcc00" stroke="#ffcc00"
                        stroke-width="7" stroke-linejoin="round" />
                </g>
            </svg>
        </div>
        <div class="habits-wrap" id="habits-list">
            <div style="text-align:center; padding:20px 0 60px; color:var(--muted); font-size:14px">
                no habits yet. use the chat bar to add one.
            </div>
        </div>
    </div>

    <!-- REMINDER CHAT BUBBLE -->
    <div id="chat-overlay" class="chat-overlay" onclick="closeBubble(event)"></div>
    <div class="chat-bubble-wrap" id="chat-bubble">
        <div class="chat-bubble">
            <textarea id="reminder-input" placeholder="add a reminder..." rows="1"></textarea>
            <button class="send-btn" onclick="sendReminder()">
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchView('reminders')">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span>Tasks</span>
        </button>
        <button class="nav-btn" onclick="switchView('discipline')">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
                <path d="M17.599 6.5a3 3 0 0 0 .399-1.375" />
                <path d="M6.002 5.125A3 3 0 0 0 6.401 6.5" />
                <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
                <path d="M19.938 10.5a4 4 0 0 1 .585.396" />
                <path d="M6 18a4 4 0 0 1-1.967-.516" />
                <path d="M19.967 17.484A4 4 0 0 1 18 18" />
            </svg>
            <span>Discipline</span>
        </button>
    </nav>

    <!-- CONTEXT MENU -->
    <div id="ctx-menu" class="ctx-menu">
        <div class="cm-item cm-edit" onclick="cmAction('edit')"><svg viewBox="0 0 24 24">
                <path
                    d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg> Edit</div>
        <div class="cm-item cm-notes" onclick="cmAction('notes')"><svg viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg> Notes</div>
        <div class="cm-divider"></div>
        <div class="cm-item cm-delete danger" onclick="cmAction('delete')"><svg viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg> Delete</div>
    </div>

    <!-- SORT MENU -->
    <div id="sort-menu" class="ctx-menu">
        <div class="cm-item" onclick="setSortMode('default')"><svg viewBox="0 0 24 24">
                <path d="M12 20V4M5 13l7 7 7-7" />
            </svg> Newest First</div>
        <div class="cm-item" onclick="setSortMode('due')"><svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg> By Due Date</div>
    </div>

    <!-- REMINDER MODAL -->
    <div class="modal" id="modal" onclick="closeIfOutside(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-title" id="modal-title">Edit</div>
            <div id="modal-body"></div>
            <input type="hidden" id="modal-rid">
            <input type="hidden" id="modal-action">
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-save" onclick="saveModal()">Save</button>
            </div>
        </div>
    </div>

    <!-- HABIT MODAL -->
    <div class="modal" id="habit-modal" onclick="closeHabitIfOutside(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-title" id="habit-modal-title">Add Habit</div>
            <input type="hidden" id="habit-modal-id">
            <input class="modal-inp" id="habit-name" placeholder="habit name (e.g., meditate, exercise)">
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeHabitModal()">Cancel</button>
                <button class="btn btn-save" onclick="saveHabit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        /* ── STATE ── */
        let remindersData = [], habitsData = [], currentView = 'reminders', currentSortMode = 'default', ctxTarget = null, ctxTargetType = 'reminder', pressTimer;

        /* ── TEXTAREA ── */
        const tx = document.getElementById('reminder-input');
        tx.addEventListener('input', function () { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; if (!this.value) this.style.height = '24px'; });
        tx.addEventListener('keydown', function (e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReminder(); } });

        /* ── UTILS ── */
        function getTodayStr() { return dateStr(new Date()); }
        function getTimestamp() { const now = new Date(); let h = now.getHours(); const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `Today at ${h}:${now.getMinutes().toString().padStart(2, '0')} ${ampm}`; }
        function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

        function getHabitCompletedToday(habitId) {
            const h = habitsData.find(x => x.id === habitId);
            if (!h) return false;
            const today = getTodayStr();
            return (h.completedDates || []).includes(today);
        }
        function getHabitStreak(habitId) {
            const h = habitsData.find(x => x.id === habitId);
            if (!h) return 0;
            const dates = h.completedDates || [];
            if (dates.length === 0) return 0;
            let streak = 0;
            const d = new Date();
            for (let i = 0; i < 365; i++) {
                const ds = dateStr(d);
                if (dates.includes(ds)) streak++;
                else if (i > 0) break; // break if missed a day, unless it's today (i=0) which hasn't ended yet
                d.setDate(d.getDate() - 1);
            }
            return streak;
        }
        function getHabitWeekStatus(habitId) {
            // Keep this only if needed elsewhere, but we don't strictly use it for the 7 boxes anymore
            return { completed: false, status: [] };
        }

        /* ── FETCH ── */
        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        async function apiFetchJson(url, options = {}, retries = 4) {
            let lastErr = null;
            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    const sep = url.includes('?') ? '&' : '?';
                    const res = await fetch(`${url}${sep}_=${Date.now()}`, {
                        cache: 'no-store',
                        ...options,
                        headers: { 'Accept': 'application/json', ...(options.headers || {}) }
                    });
                    if (!res.ok) throw new Error(`${url} ${res.status}`);
                    return await res.json();
                } catch (err) {
                    lastErr = err;
                    if (attempt === retries) break;
                    await sleep(450 * Math.pow(1.6, attempt));
                }
            }
            throw lastErr;
        }
        async function fetchReminders() {
            try {
                const rems = await apiFetchJson('/api/reminders');
                remindersData = Array.isArray(rems) ? rems : [];
                renderReminders();
                return true;
            } catch (e) {
                console.error('reminder sync failed', e);
                showToast('sync failed');
                return false;
            }
        }
        function loadHabits() {
            try {
                const stored = localStorage.getItem('bamboo.habits.v1');
                if (stored) habitsData = JSON.parse(stored);
                renderHabits();
            } catch (e) { }
        }
        function saveHabits() {
            try {
                localStorage.setItem('bamboo.habits.v1', JSON.stringify(habitsData));
            } catch (e) { }
        }

        /* ── RENDER REMINDERS ── */
        function renderReminders() {
            let sorted = [...remindersData];
            sorted.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (currentSortMode === 'due') { const aD = a.due_timestamp || 0, bD = b.due_timestamp || 0; if (!aD && !bD) return b.id - a.id; if (!aD) return 1; if (!bD) return -1; return aD - bD; }
                return b.id - a.id;
            });
            const active = sorted.filter(r => !r.completed), done = sorted.filter(r => r.completed);
            const list = document.getElementById('reminder-list');
            if (active.length === 0 && done.length === 0) {
                list.innerHTML = `<div class="empty-state">nothing here yet.<br><span style="font-size:12px;opacity:.6">tap bamboo. to add one</span></div>`;
                return;
            }
            let html = '';
            active.forEach((r, i) => html += renderItem(r, i));
            if (done.length) { html += `<div class="section-lbl">Completed</div>`; done.forEach((r, i) => html += renderItem(r, active.length + i + 1)); }
            list.innerHTML = html;
        }

        function renderItem(r, idx) {
            const delay = idx * 0.04;
            const rJ = JSON.stringify(r).replace(/\\/g, "\\\\").replace(/'/g, "&#39;").replace(/"/g, "&quot;");
            let meta = `<span><svg class="meta-ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${r.updated_at || 'Just now'}</span>`;
            if (r.notes) meta += `<span><svg class="meta-ico" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>notes</span>`;

            return `<div class="reminder-item ${r.completed ? 'completed' : ''}"
        id="item-${r.id}" style="animation-delay:${delay}s"
        onclick="handleItemClick(event,${r.id},${!r.completed})"
        oncontextmenu="handleCtx(event,'${rJ}')"
        ontouchstart="handleTouchStart(event,'${rJ}')"
        ontouchend="handleTouchEnd(event)"
        ontouchcancel="handleTouchEnd(event)">
        <div class="r-text">${escHtml(r.text)}</div>
        <div class="r-meta">${meta}</div>
    </div>`;
        }

        /* ── RENDER HABITS ── */
        function renderHabits() {
            const list = document.getElementById('habits-list');
            const flame = document.querySelector('.flame-svg');
            const today = getTodayStr();
            let doneCount = 0;
            if (habitsData && habitsData.length > 0) {
                habitsData.forEach(h => { if ((h.completedDates || []).includes(today)) doneCount++; });
            }
            if (flame) {
                if (doneCount === 0) flame.classList.add('grayscale');
                else flame.classList.remove('grayscale');
            }

            if (habitsData.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:20px 0 60px;color:var(--muted);font-size:14px">no habits yet. use the chat bar to add one.</div>';
                return;
            }
            let html = '';
            habitsData.forEach((h, idx) => {
                const streak = getHabitStreak(h.id);
                const rJ = JSON.stringify(h).replace(/\\/g, "\\\\").replace(/'/g, "&#39;").replace(/"/g, "&quot;");

                // Render 7 boxes based on streak
                let boxesHtml = '';
                for (let i = 0; i < 7; i++) {
                    boxesHtml += `<div class="habit-dot ${i < streak ? 'filled' : ''}"></div>`;
                }

                html += `<div class="habit-item"
            onclick="toggleHabitToday(${h.id})"
            oncontextmenu="handleHabitCtx(event,'${rJ}')"
            ontouchstart="handleHabitTouchStart(event,'${rJ}')"
            ontouchend="handleTouchEnd(event)"
            ontouchcancel="handleTouchEnd(event)">
            <div class="habit-header">
                <div class="habit-name">${escHtml(h.name)}</div>
                <div class="habit-streak">
                    <svg viewBox="0 0 24 24"><path d="M13.76 3c-.74 0-1.41.19-2 .52-1.41.78-2.41 2.23-2.41 3.9 0 2.49 2.01 4.5 4.5 4.5s4.5-2.01 4.5-4.5c0-1.67-1-3.12-2.41-3.9-.59-.33-1.26-.52-2-52z" fill="currentColor"/><path d="M19.5 13c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/><path d="M4.5 13c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
                    <span>${streak}</span>
                </div>
            </div>
            <div class="habit-dots">${boxesHtml}</div>
        </div>`;
            });
            list.innerHTML = html;
        }

        /* ── HABIT ACTIONS ── */
        function openAddHabitModal() {
            document.getElementById('habit-modal-id').value = '';
            document.getElementById('habit-name').value = '';
            document.getElementById('habit-modal-title').textContent = 'Add Habit';
            document.getElementById('habit-modal').classList.add('show');
            setTimeout(() => document.getElementById('habit-name').focus(), 100);
        }
        function closeHabitModal() {
            document.getElementById('habit-modal').classList.remove('show');
        }
        function closeHabitIfOutside(e) {
            if (e.target.id === 'habit-modal') closeHabitModal();
        }
        function saveHabit() {
            const id = document.getElementById('habit-modal-id').value;
            const name = document.getElementById('habit-name').value.trim();
            if (!name) { showToast('habit name required'); return; }
            if (id) {
                const h = habitsData.find(x => x.id == id);
                if (h) h.name = name;
            } else {
                habitsData.push({ id: Date.now(), name, completedDates: [], createdAt: getTodayStr() });
            }
            saveHabits();
            renderHabits();
            closeHabitModal();
            showToast(id ? 'habit updated' : 'habit added');
        }
        function deleteHabit(id) {
            habitsData = habitsData.filter(h => String(h.id) !== String(id));
            saveHabits();
            renderHabits();
            showToast('habit deleted');
        }
        function toggleHabitToday(id) {
            const h = habitsData.find(x => x.id === id);
            if (!h) return;
            const today = getTodayStr();
            const idx = (h.completedDates || []).indexOf(today);
            if (idx >= 0) {
                h.completedDates.splice(idx, 1);
            } else {
                if (!h.completedDates) h.completedDates = [];
                h.completedDates.push(today);
            }
            const week = getHabitWeekStatus(id);
            if (week.completed && !h.streakToastShown) {
                showToast('🔥 7-day streak! keep it up!');
                h.streakToastShown = true;
            } else {
                showToast(idx >= 0 ? 'unmarked' : 'marked complete');
            }
            saveHabits();
            renderHabits();
        }

        /* ── SEND REMINDER / HABIT ── */
        async function sendReminder() {
            const input = document.getElementById('reminder-input');
            let text = input.value.trim(); if (!text) return;

            if (currentView === 'discipline') {
                habitsData.push({ id: Date.now(), name: text, completedDates: [], createdAt: getTodayStr() });
                saveHabits(); renderHabits(); showToast('habit added');
                input.value = ''; input.style.height = '24px';
                document.getElementById('chat-bubble').classList.remove('show');
                document.getElementById('chat-overlay').classList.remove('show');
                return;
            }

            const now = Date.now();
            await fetch('/api/reminders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, updated_at: getTimestamp(), created_timestamp: now }) });
            input.value = ''; input.style.height = '24px';
            document.getElementById('chat-bubble').classList.remove('show');
            document.getElementById('chat-overlay').classList.remove('show');
            fetchReminders();
        }

        /* ── ITEM CLICK ── */
        async function handleItemClick(e, id, complete) {
            if (e.detail > 1) return;
            await fetch(`/api/reminders/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ completed: complete, updated_at: getTimestamp(), completed_date: complete ? getTodayStr() : '' }) });
            fetchReminders();
        }

        /* ── CONTEXT MENU ── */
        function handleCtx(e, rJ) {
            e.preventDefault();
            ctxTarget = JSON.parse(rJ.replace(/&quot;/g, '"').replace(/&#39;/g, "'"));
            ctxTargetType = 'reminder';
            const menu = document.getElementById('ctx-menu');
            menu.querySelector('.cm-notes').style.display = '';
            menu.classList.add('show');
            let x = e.clientX, y = e.clientY;
            if (x + 190 > window.innerWidth) x = window.innerWidth - 195;
            if (y + 240 > window.innerHeight) y = window.innerHeight - 245;
            menu.style.left = x + 'px'; menu.style.top = y + 'px';
        }
        function handleHabitCtx(e, rJ) {
            e.preventDefault();
            ctxTarget = JSON.parse(rJ.replace(/&quot;/g, '"').replace(/&#39;/g, "'"));
            ctxTargetType = 'habit';
            const menu = document.getElementById('ctx-menu');
            menu.querySelector('.cm-notes').style.display = 'none';
            menu.classList.add('show');
            let x = e.clientX, y = e.clientY;
            if (x + 190 > window.innerWidth) x = window.innerWidth - 195;
            if (y + 240 > window.innerHeight) y = window.innerHeight - 245;
            menu.style.left = x + 'px'; menu.style.top = y + 'px';
        }
        function handleTouchStart(e, rJ) { pressTimer = setTimeout(() => { handleCtx(e, rJ); }, 600); }
        function handleHabitTouchStart(e, rJ) { pressTimer = setTimeout(() => { handleHabitCtx(e, rJ); }, 600); }
        function handleTouchEnd() { clearTimeout(pressTimer); }
        function cmAction(act) {
            document.getElementById('ctx-menu').classList.remove('show');
            if (!ctxTarget) return;

            if (ctxTargetType === 'habit') {
                if (act === 'delete') { deleteHabit(ctxTarget.id); return; }
                if (act === 'edit') {
                    openModal('edit_habit', ctxTarget);
                }
                return;
            }

            if (act === 'delete') { deleteReminder(ctxTarget.id); return; }
            openModal(act, ctxTarget);
        }
        async function deleteReminder(id) { await fetch(`/api/reminders/${id}`, { method: 'DELETE' }); fetchReminders(); }

        /* ── MODALS ── */
        function openModal(act, r) {
            document.getElementById('modal-rid').value = r.id;
            document.getElementById('modal-action').value = act;
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            if (act === 'edit') {
                title.textContent = 'Edit';
                body.innerHTML = `<textarea id="modal-val" class="modal-inp">${escHtml(r.text)}</textarea>`;
                document.getElementById('modal').classList.add('show');
            } else if (act === 'notes') {
                title.textContent = 'Notes';
                body.innerHTML = `<textarea id="modal-val" class="modal-inp" placeholder="Add details...">${escHtml(r.notes || '')}</textarea>`;
                document.getElementById('modal').classList.add('show');
            } else if (act === 'edit_habit') {
                title.textContent = 'Edit Habit';
                body.innerHTML = `<input id="modal-val" class="modal-inp" value="${escHtml(r.name)}">`;
                document.getElementById('modal').classList.add('show');
            }
            setTimeout(() => {
                const v = document.getElementById('modal-val');
                if (!v) return;
                v.focus();
                v.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        saveModal();
                    }
                });
            }, 100);
        }
        function closeModal() { document.getElementById('modal').classList.remove('show'); }
        function closeIfOutside(e) { if (e.target.id === 'modal') closeModal(); }
        async function saveModal() {
            const id = document.getElementById('modal-rid').value;
            const act = document.getElementById('modal-action').value;

            if (act === 'edit_habit') {
                const val = document.getElementById('modal-val').value.trim();
                const h = habitsData.find(x => String(x.id) === String(id));
                if (h && val) {
                    h.name = val;
                    saveHabits();
                    renderHabits();
                    showToast('habit updated');
                }
                closeModal();
                return;
            }

            const payload = { updated_at: getTimestamp() };
            if (act === 'edit') payload.text = document.getElementById('modal-val').value;
            else if (act === 'notes') payload.notes = document.getElementById('modal-val').value;
            await fetch(`/api/reminders/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            closeModal(); fetchReminders();
        }

        /* ── BODY CLICK ── */
        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('.ctx-menu')) document.getElementById('ctx-menu').classList.remove('show'), document.getElementById('sort-menu').classList.remove('show');
            if (!e.target.closest('.reminder-item') && !e.target.closest('.habit-item') && !e.target.closest('.modal') && !e.target.closest('.ctx-menu') && !e.target.closest('.chat-bubble-wrap') && !e.target.closest('.logo') && !e.target.closest('.sort-btn') && !e.target.closest('.bottom-nav') && (currentView === 'reminders' || currentView === 'discipline')) {
                const b = document.getElementById('chat-bubble');
                const o = document.getElementById('chat-overlay');
                if (b.classList.contains('show')) {
                    // We shouldn't hit this often because the overlay covers the screen and stops propagation
                    b.classList.remove('show');
                    o.classList.remove('show');
                }
                else {
                    b.classList.add('show');
                    o.classList.add('show');
                    setTimeout(() => document.getElementById('reminder-input').focus(), 300);
                }
            }
        });
        function toggleBubble(e) {
            if (e) e.stopPropagation();
            const b = document.getElementById('chat-bubble');
            const o = document.getElementById('chat-overlay');
            if (b.classList.contains('show')) {
                b.classList.remove('show');
                o.classList.remove('show');
            }
            else {
                b.classList.add('show');
                o.classList.add('show');
                setTimeout(() => document.getElementById('reminder-input').focus(), 300);
            }
        }
        function closeBubble(e) {
            if (e) e.stopPropagation();
            document.getElementById('chat-bubble').classList.remove('show');
            document.getElementById('chat-overlay').classList.remove('show');
        }
        function openSortMenu(e) {
            e.stopPropagation(); const m = document.getElementById('sort-menu'); m.classList.add('show');
            const r = e.currentTarget.getBoundingClientRect(); m.style.top = (r.bottom + 6) + 'px'; m.style.left = (r.right - 162) + 'px';
        }
        function setSortMode(m) { currentSortMode = m; document.getElementById('sort-menu').classList.remove('show'); renderReminders(); }

        /* ── VIEW SWITCHING ── */
        function switchView(v) {
            if (currentView === v) return;
            currentView = v;
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.querySelector(`.nav-btn[onclick="switchView('${v}')"]`).classList.add('active');
            document.getElementById('sort-btn-wrap').style.display = v === 'reminders' ? '' : 'none';
            document.getElementById('chat-bubble').classList.remove('show');
            document.getElementById('chat-overlay').classList.remove('show');
            document.getElementById('reminder-input').placeholder = v === 'reminders' ? 'add a reminder...' : 'add a habit...';
        }

        /* ── TOAST ── */
        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast';
            t.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span>${escHtml(msg)}</span>`;
            document.body.appendChild(t); setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
        }

        /* ── INIT ── */
        loadHabits();
        fetchReminders();
    </script>
</body>

</html>
